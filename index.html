<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz - Egzamin Android</title>
    <style>
      :root {
        --primary: #007aff;
        --primary-hover: #0056b3;
        --success: #34c759;
        --danger: #ff3b30;
        --bg: #f2f2f7;
        --card-bg: #ffffff;
        --text: #1c1c1e;
        --text-muted: #8e8e93;
        --option-bg: #ffffff;
        --option-border: #e5e5ea;
        --option-hover: #f2f2f7;
        --option-selected: #e5f1ff;
        --option-selected-border: #007aff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --primary: #0a84ff;
          --primary-hover: #006ee6;
          --success: #32d74b;
          --danger: #ff453a;
          --bg: #000000;
          --card-bg: #1c1c1e;
          --text: #f2f2f7;
          --text-muted: #aeaeb2;
          --option-bg: #1c1c1e;
          --option-border: #3a3a3c;
          --option-hover: #2c2c2e;
          --option-selected: #1a2a3a;
          --option-selected-border: #0a84ff;
        }
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .quiz-container {
        background: var(--card-bg);
        max-width: 800px;
        width: 100%;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 40px;
        box-sizing: border-box;
      }
      .hidden {
        display: none !important;
      }
      h1 {
        margin-top: 0;
        color: var(--text);
        font-size: 2.2em;
        font-weight: 700;
        margin-bottom: 16px;
        letter-spacing: -0.02em;
      }
      .intro-text {
        font-size: 1.15em;
        color: var(--text-muted);
        margin-bottom: 35px;
        line-height: 1.6;
      }
      .progress {
        font-size: 0.95em;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .progress-bar-container {
        flex-grow: 1;
        background: var(--option-border);
        height: 8px;
        border-radius: 4px;
        margin-right: 20px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: var(--primary);
        width: 0%;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .question-box {
        margin-bottom: 30px;
      }
      .question {
        font-size: 1.3em;
        font-weight: 600;
        white-space: pre-wrap;
        line-height: 1.4;
        color: var(--text);
      }
      code {
        background: var(--option-hover);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
        color: #d50000;
      }
      @media (prefers-color-scheme: dark) {
        code { color: #ff6b6b; }
      }
      .option {
        display: flex;
        align-items: center;
        background: var(--option-bg);
        margin: 12px 0;
        padding: 16px 20px;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 1.05em;
        border: 2px solid var(--option-border);
        line-height: 1.45;
        white-space: pre-wrap;
        color: var(--text);
      }
      .option:hover {
        background: var(--option-hover);
      }
      .option.selected {
        background: var(--option-selected);
        border-color: var(--option-selected-border);
      }
      .option.correct-answer {
        background: rgba(52, 199, 89, 0.15);
        border-color: var(--success);
      }
      .option.wrong-answer {
        background: rgba(255, 59, 48, 0.15);
        border-color: var(--danger);
        opacity: 0.8;
      }
      .checkbox-indicator {
        width: 22px;
        height: 22px;
        border-radius: 11px; /* Zmienione na kółko dla jednokrotnego wyboru */
        border: 2px solid var(--text-muted);
        margin-right: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .option.selected .checkbox-indicator {
        background: var(--primary);
        border-color: var(--primary);
      }
      .option.selected .checkbox-indicator::after {
        content: "";
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
      }
      .option.correct-answer .checkbox-indicator {
        background: var(--success);
        border-color: var(--success);
      }
      .option.correct-answer .checkbox-indicator::after {
        content: "✓";
        color: white;
        background: transparent;
        font-weight: bold;
        font-size: 14px;
      }
      .option.wrong-answer .checkbox-indicator {
        background: var(--danger);
        border-color: var(--danger);
      }
      .option.wrong-answer .checkbox-indicator::after {
        content: "✕";
        color: white;
        background: transparent;
        font-weight: bold;
        font-size: 14px;
      }
      .btn {
        display: block;
        width: 100%;
        background: var(--primary);
        color: #fff;
        border: none;
        padding: 18px 24px;
        border-radius: 14px;
        cursor: pointer;
        font-size: 1.15em;
        font-weight: 600;
        margin-top: 30px;
        transition: all 0.2s;
      }
      .btn:hover {
        background: var(--primary-hover);
      }
      .btn:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
        opacity: 0.5;
      }
      .feedback {
        margin-top: 25px;
        padding: 16px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1.05em;
        display: none;
        animation: fadeIn 0.3s ease;
        line-height: 1.5;
      }
      .feedback.correct {
        background: rgba(52, 199, 89, 0.15);
        color: var(--success);
        display: block;
      }
      .feedback.incorrect {
        background: rgba(255, 59, 48, 0.15);
        color: var(--danger);
        display: block;
      }
      .explanation {
        margin-top: 10px;
        font-size: 0.95em;
        font-weight: normal;
        border-top: 1px solid rgba(128, 128, 128, 0.2);
        padding-top: 10px;
        color: var(--text);
      }
      .score-container {
        text-align: center;
      }
      .score {
        font-size: 4em;
        font-weight: 800;
        color: var(--primary);
        margin: 20px 0;
        letter-spacing: -0.02em;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (max-width: 600px) {
        .quiz-container { padding: 25px 20px; }
        h1 { font-size: 1.8em; }
        .question { font-size: 1.15em; }
        .option { font-size: 1em; padding: 14px 16px; }
        .btn { padding: 16px 20px; }
      }
    </style>
  </head>
  <body>
    <div class="quiz-container" id="quiz-container">
      <div id="start-screen">
        <h1>Egzamin Android - Quiz</h1>
        <p class="intro-text">
          Baza pytań zaktualizowana. Wszystkie pytania traktowane są jako pytania <strong>jednokrotnego wyboru</strong>.<br /><br />
          Z naszej puli <strong><span id="total-q-count"></span> pytań</strong> aplikacja losuje <strong>21 zagadnień</strong> na każdą sesję.
        </p>
        <button class="btn" id="start-btn">Rozpocznij Quiz</button>
      </div>

      <div id="quiz-screen" class="hidden">
        <div class="progress">
          <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <span id="progress-text">1 / 21</span>
        </div>

        <div class="question-box">
          <div class="question" id="question-text"></div>
        </div>

        <div id="options-container"></div>

        <div id="feedback-message" class="feedback"></div>

        <button class="btn" id="check-btn" disabled>Zaznacz odpowiedź, aby sprawdzić</button>
        <button class="btn hidden" id="next-btn">Następne pytanie</button>
      </div>

      <div id="result-screen" class="hidden score-container">
        <h1>Koniec Quizu!</h1>
        <p class="intro-text">Oto Twój wynik z tej sesji:</p>
        <div class="score" id="score"></div>
        <button class="btn" id="restart-btn">Zagraj ponownie (nowe losowanie)</button>
      </div>
    </div>

    <!-- Ukryty magazyn danych zabezpieczający surowy tekst przed rozsypaniem HTML-a -->
    <textarea id="quiz-data" style="display: none;">
1) Które stwierdzenie dotyczące odbiorców rozgłoszeń (broadcast receivers) jest fałszywe?
a) umożliwiają przesyłanie informacji pomiędzy składnikami tej samej aplikacji
**b) może działać dowolnie długo (jak usługa)**
c) umożliwiają reagowanie na zdarzenia systemowe
d) umożliwiają reagowanie na rozgłoszenia dowolnego typu (w tym samodzielnie utworzone)
Uzasadnienie: "Odbiorca rozgłoszeń (a w zasadzie jego metoda onReceive()) powinien szybko zakończyć swoje działanie" (slajd 211)

Uzasadnienie: "Preferowanie wartości wrap_content albo match_parent w przypadku wysokości/szerokości zamiast konkretnych wartości" (slajd 353)

    <script>
      function parseQuestions(rawText) {
        const cleanText = "\n" + rawText.trim();
        const blocks = cleanText.split(/\n\s*(?=\d+\))/);
        const questions = [];

        blocks.forEach(block => {
            if (!block.trim()) return;
            const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let qText = "";
            let opts = [];
            let exp = "";
            let correctIdx = [];
            let state = "q";

            for (let line of lines) {
                if (line.toLowerCase().startsWith("uzasadnienie:")) {
                    state = "exp";
                    exp += line.substring(13).trim() + " ";
                    continue;
                }
                const optMatch = line.match(/^\s*(?:\*\*)*([a-d])\)/);
                if (optMatch && state !== "exp") {
                    state = "opt";
                    const isCorrect = line.includes('**');
                    let cleanLine = line.replace(/^\s*(?:\*\*)*[a-d]\)\s*/, '').replace(/\*+$/, '').trim();
                    if (isCorrect) correctIdx.push(opts.length);
                    opts.push(cleanLine);
                    continue;
                }
                if (state === "q") {
                    qText += line + "\n";
                } else if (state === "opt") {
                    if (opts.length > 0) {
                        let isCorrect = line.includes('**');
                        let cleanLine = line.replace(/\*+$/, '').replace(/^\*+/, '').trim();
                        opts[opts.length - 1] += " " + cleanLine;
                        if (isCorrect && !correctIdx.includes(opts.length - 1)) correctIdx.push(opts.length - 1);
                    }
                } else if (state === "exp") {
                    exp += line + " ";
                }
            }
            qText = qText.replace(/^\d+\)\s*/, '').trim();
            if (opts.length > 0) {
                questions.push({
                    question: qText,
                    options: opts,
                    correct: correctIdx,
                    explanation: exp.trim()
                });
            }
        });
        return questions;
      }

      // Inicjalizacja pytań przy użyciu ukrytego elementu textarea
      const rawData = document.getElementById("quiz-data").value;
      const allQuestions = parseQuestions(rawData);

      const totalQuestionsToAsk = 21;

      document.getElementById("total-q-count").innerText = allQuestions.length;

      let currentSessionQuestions = [];
      let currentQuestionIndex = 0;
      let score = 0;
      let selectedOptions = new Set();
      let isQuestionChecked = false;

      function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
          randomIndex = Math.floor(Math.random() * currentIndex);
          currentIndex--;
          [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
      }

      document.getElementById("start-btn").addEventListener("click", startQuiz);
      document.getElementById("check-btn").addEventListener("click", checkAnswer);
      document.getElementById("next-btn").addEventListener("click", nextQuestion);
      document.getElementById("restart-btn").addEventListener("click", startQuiz);

      function startQuiz() {
        score = 0;
        currentQuestionIndex = 0;

        let shuffledAll = shuffle([...allQuestions]);
        currentSessionQuestions = shuffledAll.slice(0, Math.min(totalQuestionsToAsk, allQuestions.length));

        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");

        showQuestion();
      }

      function formatCode(text) {
        if (!text) return "";
        let escapedText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        return escapedText.replace(/`([^`]+)`/g, "<code>$1</code>");
      }

      function showQuestion() {
        isQuestionChecked = false;
        selectedOptions.clear();

        document.getElementById("check-btn").classList.remove("hidden");
        document.getElementById("check-btn").disabled = true;
        document.getElementById("check-btn").innerText = "Sprawdź odpowiedź";

        const nextBtn = document.getElementById("next-btn");
        nextBtn.classList.add("hidden");
        nextBtn.innerText = "Następne pytanie";

        const feedbackEl = document.getElementById("feedback-message");
        feedbackEl.className = "feedback";
        feedbackEl.innerHTML = "";

        const q = currentSessionQuestions[currentQuestionIndex];

        const progressPercent = (currentQuestionIndex / currentSessionQuestions.length) * 100;
        document.getElementById("progress-bar").style.width = progressPercent + "%";
        document.getElementById("progress-text").innerText = `${currentQuestionIndex + 1} / ${currentSessionQuestions.length}`;

        document.getElementById("question-text").innerHTML = formatCode(q.question);

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        let optionsWithIndex = q.options.map((opt, index) => ({
          text: opt,
          originalIndex: index,
        }));
        optionsWithIndex = shuffle(optionsWithIndex);

        optionsWithIndex.forEach((optObj) => {
          const optDiv = document.createElement("div");
          optDiv.className = "option";
          optDiv.dataset.originalIndex = optObj.originalIndex;

          const indicator = document.createElement("div");
          indicator.className = "checkbox-indicator";
          optDiv.appendChild(indicator);

          const textSpan = document.createElement("span");
          textSpan.innerHTML = formatCode(optObj.text);
          optDiv.appendChild(textSpan);

          optDiv.addEventListener("click", function () {
            if (isQuestionChecked) return;

            // Logika WYŁĄCZNIE dla jednokrotnego wyboru
            selectedOptions.clear();
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            
            selectedOptions.add(optObj.originalIndex);
            this.classList.add("selected");

            document.getElementById("check-btn").disabled = false;
          });

          optionsContainer.appendChild(optDiv);
        });
      }

      function checkAnswer() {
        isQuestionChecked = true;
        document.getElementById("check-btn").classList.add("hidden");
        document.getElementById("next-btn").classList.remove("hidden");

        const q = currentSessionQuestions[currentQuestionIndex];
        const correctSet = new Set(q.correct);

        let isPerfect = true;
        if (selectedOptions.size !== correctSet.size) {
          isPerfect = false;
        } else {
          for (let selected of selectedOptions) {
            if (!correctSet.has(selected)) {
              isPerfect = false;
              break;
            }
          }
        }

        document.querySelectorAll(".option").forEach((optDiv) => {
          const originalIndex = parseInt(optDiv.dataset.originalIndex);
          const isSelected = selectedOptions.has(originalIndex);
          const isActuallyCorrect = correctSet.has(originalIndex);

          optDiv.classList.remove("selected");

          if (isActuallyCorrect) {
            optDiv.classList.add("correct-answer");
          } else if (isSelected && !isActuallyCorrect) {
            optDiv.classList.add("wrong-answer");
          }
        });

        const feedbackEl = document.getElementById("feedback-message");
        if (isPerfect) {
          score++;
          feedbackEl.innerHTML = "<strong>Świetnie! Poprawna odpowiedź.</strong>";
          feedbackEl.classList.add("correct");
        } else {
          feedbackEl.innerHTML = "<strong>Niestety, to nie ta odpowiedź.</strong><br>Prawidłowa została zaznaczona na zielono.";
          feedbackEl.classList.add("incorrect");
        }

        if (q.explanation && q.explanation.trim() !== "") {
          const expDiv = document.createElement("div");
          expDiv.className = "explanation";
          expDiv.innerHTML = "<strong>Uzasadnienie:</strong><br>" + formatCode(q.explanation);
          feedbackEl.appendChild(expDiv);
        }

        if (currentQuestionIndex === currentSessionQuestions.length - 1) {
          document.getElementById("next-btn").innerText = "Zakończ i pokaż wynik";
        }
      }

      function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentSessionQuestions.length) {
          showQuestion();
        } else {
          showResult();
        }
      }

      function showResult() {
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.remove("hidden");

        const percentage = Math.round((score / currentSessionQuestions.length) * 100);
        document.getElementById("score").innerText = `${score} / ${currentSessionQuestions.length} \n(${percentage}%)`;
      }
    </script>
  </body>
